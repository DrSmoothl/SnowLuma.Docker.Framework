name: docker-publish

on:
  workflow_dispatch:
    inputs:
      image:
        description: Docker image name, for example docker.io/example/snowluma
        required: true
        default: ""
      tag:
        description: Docker image tag
        required: true
        default: ""
      push:
        description: Push image after build
        required: true
        type: boolean
        default: false
      platforms:
        description: Docker target platforms
        required: true
        default: "linux/amd64,linux/arm64"

jobs:
  resolve:
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Resolve target platforms
        id: matrix
        env:
          PLATFORMS: ${{ inputs.platforms }}
        run: |
          set -eu
          matrix='{"include":['
          separator=''
          case ",${PLATFORMS}," in
            *",linux/amd64,"*)
              matrix="${matrix}${separator}{\"arch\":\"amd64\",\"platform\":\"linux/amd64\",\"os\":\"ubuntu-22.04\"}"
              separator=','
              ;;
          esac
          case ",${PLATFORMS}," in
            *",linux/arm64,"*)
              matrix="${matrix}${separator}{\"arch\":\"arm64\",\"platform\":\"linux/arm64\",\"os\":\"ubuntu-22.04-arm\"}"
              separator=','
              ;;
          esac
          matrix="${matrix}]}"
          if [ "${matrix}" = '{"include":[]}' ]; then
            echo "No supported platforms selected. Use linux/amd64, linux/arm64, or both." >&2
            exit 1
          fi
          echo "matrix=${matrix}" >> "${GITHUB_OUTPUT}"

  build:
    needs: resolve
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.resolve.outputs.matrix) }}
    runs-on: ${{ matrix.os }}
    environment: SnowLuma
    steps:
      - name: Checkout Docker framework
        uses: actions/checkout@v4

      - name: Verify prebuilt SnowLuma artifact
        run: ./scripts/prepare-artifact.sh

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: ${{ inputs.push }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image
        env:
          IMAGE: ${{ inputs.image }}
          TAG: ${{ inputs.tag }}
          PUSH: ${{ inputs.push }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          set -eu
          if [ -z "${IMAGE}" ]; then
            echo "workflow input image is required"
            exit 1
          fi
          if [ -z "${TAG}" ]; then
            echo "workflow input tag is required"
            exit 1
          fi
          if [ "${PUSH}" = "true" ]; then
            docker buildx build \
              --platform "${PLATFORM}" \
              --tag "${IMAGE}" \
              --file ./Dockerfile \
              --output "type=image,push-by-digest=true,name-canonical=true,push=true" \
              --metadata-file metadata.json \
              .
            digest="$(jq -r '."containerimage.digest"' metadata.json)"
            if [ -z "${digest}" ] || [ "${digest}" = "null" ]; then
              echo "Unable to resolve pushed image digest" >&2
              cat metadata.json >&2
              exit 1
            fi
            mkdir -p digests
            touch "digests/${digest#sha256:}"
          else
            docker buildx build \
              --platform "${PLATFORM}" \
              --tag "${IMAGE}:${TAG}" \
              --file ./Dockerfile \
              --load \
              .
          fi

      - name: Upload Docker image digest
        if: ${{ inputs.push }}
        uses: actions/upload-artifact@v4
        with:
          name: docker-digest-${{ matrix.arch }}
          path: digests/*
          if-no-files-found: error
          retention-days: 1

      - name: Docker logout
        if: ${{ always() && inputs.push }}
        run: docker logout || true

  merge:
    if: ${{ inputs.push }}
    needs:
      - resolve
      - build
    runs-on: ubuntu-22.04
    environment: SnowLuma
    steps:
      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Download Docker image digests
        uses: actions/download-artifact@v4
        with:
          pattern: docker-digest-*
          path: digests
          merge-multiple: true

      - name: Create Docker manifest
        run: |
          set -euo pipefail
          image="${{ inputs.image }}"
          tag="${{ inputs.tag }}"
          cd digests
          shopt -s nullglob
          digest_files=(*)
          if [ "${#digest_files[@]}" -eq 0 ]; then
            echo "No Docker image digests were produced" >&2
            exit 1
          fi
          refs=()
          for digest in "${digest_files[@]}"; do
            refs+=("${image}@sha256:${digest}")
          done
          tags=(--tag "${image}:${tag}")
          if [ "${tag}" != "latest" ]; then
            tags+=(--tag "${image}:latest")
          fi
          docker buildx imagetools create "${tags[@]}" "${refs[@]}"
          docker buildx imagetools inspect "${image}:${tag}"

      - name: Docker logout
        if: always()
        run: docker logout || true
